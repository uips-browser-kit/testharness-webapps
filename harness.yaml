data:
  set: default-ng
  # set: default
  shared_entities:
    accounts:
    - salesforce
    - dynamics
    contacts:
    - salesforce
    - dynamics
    opportunities:
    - salesforce
    - dynamics

prometheus:
  scrape_interval: 15s

keycloak:
  realm: harness
  token_expiry_sec: 300
  session_idle_sec: 600
  clients:
  - id: browser-client
    flow: authorization_code
    redirect_uris:
    - "http://*.local/*"
  - id: service-client
    flow: client_credentials
    secret_env: KEYCLOAK_SERVICE_CLIENT_SECRET
  users:
  - username: analyst
    password_env: KEYCLOAK_USER_ANALYST_PASS
    roles: [analyst]
  - username: admin
    password_env: KEYCLOAK_USER_ADMIN_PASS
    roles: [admin, analyst]
