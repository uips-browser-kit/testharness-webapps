    route_id: home
    href: /home
  - label: Apps
    route_id: app-list
    href: /play/e/harness/a
    children:
    - label: App Detail
      route_id: app
      href: /play/e/harness/a/harness
  routes:
  - id: app
    path: /play/e/{env_id}/a/{app_id}
    pattern_type: path
    query_params:
    - tenantId
    - screen
    server_visible: true
    template: app
    data_entity: sales_orders
  - id: app-list
    path: /play/e/{env_id}/a
    pattern_type: path
    query_params: []
    server_visible: true
    template: shared/list
    data_entity: sales_orders
    list_fields: [order_number, customer_name, status, total, order_date]
