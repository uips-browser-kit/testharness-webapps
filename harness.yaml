- id: sap
  vendor: SAP
  product: Fiori
  layout: layouts/default.html
  environments:
    dev:
      host: sap-dev.local
      base_path: /
      scheme: http
    prod:
      host: sap-prod.local
      base_path: /
      scheme: http
  nav:
  - label: Home
    route_id: home
    href: /sap/bc/ui5_ui5/ui2/ushell
  - label: Sales Orders
    route_id: order-list
    href: /sap/bc/ui5_ui5/ui2/ushell
    children:
    - label: Order Detail
      route_id: shell
      href: /sap/bc/ui5_ui5/ui2/ushell
  routes:
  - id: shell
    path: /sap/bc/ui5_ui5/ui2/ushell
    pattern_type: query
    query_params:
    - sap-client
    - so
    server_visible: true
    note: Hash fragment (#SalesOrder-display?SO=...) is not server-visible; 'so' is
      the harness server-side representation
    template: shell
    data_entity: sales_orders
    data_key_field: order_number
    data_key_param: so
    url_template: /sap/bc/ui5_ui5/ui2/ushell?sap-client=100&so={so}
    relationships:
      account_id:
        entity: accounts
        key_param: id
        apps:
        - salesforce
        - dynamics
  - id: order-list
    path: /sap/bc/ui5_ui5/ui2/ushell
    pattern_type: query
    query_params:
    - sap-client
    server_visible: true
    template: shared/list
    data_entity: sales_orders
  - id: home
    path: /sap/bc/ui5_ui5/ui2/ushell
    pattern_type: path
    query_params: []
    server_visible: true
    template: home

- id: oracle
  vendor: Oracle
  product: Fusion / EBS
  layout: layouts/default.html
  environments:
    dev:
      host: oracle-dev.local
      base_path: /
      scheme: http
    prod:
      host: oracle-prod.local
      base_path: /
      scheme: http
  nav:
  - label: Home
    route_id: home
    href: /fscmUI/faces/FuseOverview
  - label: Invoices
    route_id: welcome
    href: /fscmUI/faces/FuseWelcome
    children:
    - label: Invoice Detail
      route_id: invoice-detail
      href: /fscmUI/faces/FuseWelcome
  routes:
  - id: invoice-detail
    path: /fscmUI/faces/FuseWelcome
    pattern_type: query
    query_params:
    - _adf.ctrl-state
    - invoice_number
    server_visible: true
    template: shared/detail
    data_entity: invoices
    data_key_field: invoice_number
    url_template: /fscmUI/faces/FuseWelcome?_adf.ctrl-state=oracle-harness&invoice_number={invoice_number}
    relationships:
      account_id:
        entity: accounts
        key_param: id
        apps:
        - salesforce
        - dynamics
      order_id:
        entity: orders
        key_param: order_number
        apps:
        - sap
  - id: welcome
    path: /fscmUI/faces/FuseWelcome
    pattern_type: query
    query_params:
    - _adf.ctrl-state
    server_visible: true
    template: shared/list
    data_entity: invoices
  - id: home
    path: /fscmUI/faces/FuseOverview
    pattern_type: path
    query_params: []
    server_visible: true
    template: home

