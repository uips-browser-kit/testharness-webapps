apps:
- id: salesforce
  latency_ms:
    min: 150
    max: 350
  vendor: Salesforce
  product: Lightning
  layout: layouts/default.html
  environments:
    dev:
      host: salesforce-dev.local
      base_path: /
      scheme: http
    prod:
      host: salesforce-prod.local
      base_path: /
      scheme: http
  scenarios:
  - name: session-expired
    description: Auth session has expired mid-flow
    fault:
      kind: auth_error
      detail: "Session expired — re-authentication required"
  - name: rate-limited
    description: API quota exceeded
    fault:
      kind: rate_limit
      detail: "Rate limit exceeded — retry after backoff"
  - name: degraded
    description: Backend intermittently unavailable
    delay_ms: 1500
    fault:
      kind: unavailable
      detail: "Service temporarily degraded"
  - name: record-locked
    description: Record locked by another user
    fault:
      kind: business_error
      detail: "Record is locked by another user"
  nav:
  - label: Home
    route_id: dashboard
    href: /lightning/page/home
  - label: Accounts
    route_id: account-list
    href: /lightning/r/Account/list/view
    children:
    - label: Account Detail
      route_id: account-detail
      href: /lightning/r/Account/{id}/view
  - label: Contacts
    route_id: contact-list
    href: /lightning/r/Contact/list/view
    children:
    - label: Contact Detail
      route_id: contact-detail
      href: /lightning/r/Contact/{id}/view
  - label: Opportunities
    route_id: opportunity-list
    href: /lightning/r/Opportunity/list/view
    children:
    - label: Opportunity Detail
      route_id: opportunity-detail
      href: /lightning/r/Opportunity/{id}/view
  routes:
  - id: account-list
    path: /lightning/r/Account/list/view
    pattern_type: path
    query_params: []
    server_visible: true
    template: account_list
    data_entity: accounts
  - id: account-detail
    path: /lightning/r/Account/{id}/view
    pattern_type: path
    query_params: []
    server_visible: true
    template: account_detail
    data_entity: accounts
    data_key_field: id
    related:
    - entity: contacts
      via: account_id
      fields: [first_name, last_name, title, email]
    - entity: opportunities
      via: account_id
      fields: [name, stage, amount, close_date]
    - entity: cases
      via: account_id
      fields: [id, subject, status, priority]
  - id: contact-list
    path: /lightning/r/Contact/list/view
    pattern_type: path
    query_params: []
    server_visible: true
    template: shared/list
    data_entity: contacts
    list_fields: [first_name, last_name, title, email]
  - id: contact-detail
    path: /lightning/r/Contact/{id}/view
    pattern_type: path
    query_params: []
    server_visible: true
    template: contact_detail
    data_entity: contacts
    data_key_field: id
    related:
    - entity: accounts
      from_field: account_id
      fields: [name, industry]
    - entity: cases
      via: contact_id
      fields: [id, subject, status]
  - id: opportunity-list
    path: /lightning/r/Opportunity/list/view
    pattern_type: path
    query_params: []
    server_visible: true
    template: shared/list
    data_entity: opportunities
    list_fields: [name, stage, amount, close_date]
  - id: opportunity-detail
    path: /lightning/r/Opportunity/{id}/view
    pattern_type: path
    query_params: []
    server_visible: true
    template: opportunity_detail
    data_entity: opportunities
    data_key_field: id
    related:
    - entity: accounts
      from_field: account_id
      fields: [name, industry]
  - id: dashboard
    path: /lightning/page/home
    pattern_type: path
    query_params: []
    server_visible: true
    template: dashboard

