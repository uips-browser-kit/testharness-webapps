apps:
- id: salesforce
  vendor: Salesforce
  product: Lightning
  layout: layouts/default.html
  environments:
    dev:
      host: sf-dev.local
      base_path: /
      scheme: http
    prod:
      host: salesforce.company.com
      base_path: /
      scheme: http
  nav:
  - label: Home
    route_id: dashboard
    href: /lightning/page/home
  - label: Accounts
    route_id: account-list
    href: /lightning/r/Account/list/view
    children:
    - label: Account Detail
      route_id: account-detail
      href: /lightning/r/Account/{id}/view
  routes:
  - id: account-list
    path: /lightning/r/Account/list/view
    pattern_type: path
    query_params: []
    server_visible: true
    template: account_list
    data_entity: accounts
  - id: account-detail
    path: /lightning/r/Account/{id}/view
    pattern_type: path
    query_params: []
    server_visible: true
    template: account_detail
    data_entity: accounts
    data_key_field: id
  - id: dashboard
    path: /lightning/page/home
    pattern_type: path
    query_params: []
    server_visible: true
    template: dashboard

- id: dynamics
  vendor: Microsoft
  product: Dynamics 365
  layout: layouts/default.html
  environments:
    dev:
      host: org.crm.dynamics.local
      base_path: /
      scheme: http
    prod:
      host: dynamics.company.com
      base_path: /
      scheme: http
  nav:
  - label: Accounts
    route_id: record
    href: /main.aspx
  routes:
  - id: record
    path: /main.aspx
    pattern_type: query
    query_params:
    - appid
    - pagetype
    - id
    server_visible: true
    template: record
    data_entity: accounts
    data_key_field: id

- id: servicenow
  vendor: ServiceNow
  product: Workspace
  layout: layouts/default.html
  environments:
    dev:
      host: instance.service-now.local
      base_path: /
      scheme: http
    prod:
      host: servicedesk.company.com
      base_path: /
      scheme: http
  nav:
  - label: Incidents
    route_id: incident
    href: /now/workspace/agent/record/incident
  routes:
  - id: incident
    path: /now/workspace/agent/record/incident/{sys_id}
    pattern_type: path
    query_params: []
    server_visible: true
    template: incident
    data_entity: incidents
    data_key_field: sys_id

- id: sap
  vendor: SAP
  product: Fiori
  layout: layouts/default.html
  environments:
    dev:
      host: erp-dev.company.com
      base_path: /
      scheme: http
    prod:
      host: erp.company.com
      base_path: /
      scheme: http
  nav:
  - label: Sales Orders
    route_id: shell
    href: /sap/bc/ui5_ui5/ui2/ushell
  routes:
  - id: shell
    path: /sap/bc/ui5_ui5/ui2/ushell
    pattern_type: query
    query_params:
    - sap-client
    - so
    server_visible: true
    note: Hash fragment (#SalesOrder-display?SO=...) is not server-visible; 'so' is
      the harness server-side representation
    template: shell
    data_entity: sales_orders
    data_key_field: order_number
    data_key_param: so

- id: oracle
  vendor: Oracle
  product: Fusion / EBS
  layout: layouts/default.html
  environments:
    dev:
      host: oracle-dev.company.com
      base_path: /
      scheme: http
    prod:
      host: finance.company.com
      base_path: /
      scheme: http
  nav:
  - label: Invoices
    route_id: welcome
    href: /fscmUI/faces/FuseWelcome
  routes:
  - id: welcome
    path: /fscmUI/faces/FuseWelcome
    pattern_type: query
    query_params:
    - _adf.ctrl-state
    server_visible: true
    template: welcome
    data_entity: invoices

- id: workday
  vendor: Workday
  product: Workday
  layout: layouts/default.html
  environments:
    dev:
      host: tenant.workday.local
      base_path: /
      scheme: http
    prod:
      host: hr.company.com
      base_path: /
      scheme: http
  nav:
  - label: Home
    route_id: home
    href: /home
  - label: Employees
    route_id: task
    href: /home.htmld
  routes:
  - id: home
    path: /home
    pattern_type: path
    query_params: []
    server_visible: true
    template: home
  - id: task
    path: /home.htmld
    pattern_type: query
    query_params:
    - redirect
    - id
    server_visible: true
    template: task
    data_entity: employees
    data_key_field: employee_id
    data_key_param: id

- id: jira
  vendor: Atlassian
  product: Jira
  layout: layouts/default.html
  environments:
    cloud:
      host: jira.company.atlassian.local
      base_path: /
      scheme: http
    self-hosted:
      host: jira.company.com
      base_path: /
      scheme: http
  nav:
  - label: Issues
    route_id: issue
    href: /browse
  routes:
  - id: issue
    path: /browse/{issue_key}
    pattern_type: path
    query_params: []
    server_visible: true
    template: issue
    data_entity: issues
    data_key_field: key
    data_key_param: issue_key

- id: confluence
  vendor: Atlassian
  product: Confluence
  layout: layouts/default.html
  environments:
    cloud:
      host: confluence.company.atlassian.local
      base_path: /wiki
      scheme: http
    self-hosted:
      host: wiki.company.com
      base_path: /
      scheme: http
  nav:
  - label: Pages
    route_id: page
    href: /spaces
  routes:
  - id: page
    path: /spaces/{space_key}/pages/{page_id}
    pattern_type: path
    query_params: []
    server_visible: true
    template: page
    data_entity: pages
    data_key_field: page_id

- id: sharepoint
  vendor: Microsoft
  product: SharePoint
  layout: layouts/default.html
  environments:
    cloud:
      host: tenant.sharepoint.local
      base_path: /
      scheme: http
    self-hosted:
      host: intranet.company.com
      base_path: /
      scheme: http
  nav:
  - label: Documents
    route_id: documents
    href: /sites
  routes:
  - id: documents
    path: /sites/{site_name}/Shared%20Documents/Forms/AllItems.aspx
    pattern_type: path
    query_params: []
    server_visible: true
    note: URL-encoded space is a static segment — preserved as-is
    template: documents
    data_entity: documents

- id: power-bi
  vendor: Microsoft
  product: Power BI
  layout: layouts/default.html
  environments:
    cloud:
      host: app.powerbi.local
      base_path: /
      scheme: http
    self-hosted:
      host: analytics.company.com
      base_path: /
      scheme: http
  nav:
  - label: Reports
    route_id: report
    href: /groups
  routes:
  - id: report
    path: /groups/{workspace}/reports/{report_id}
    pattern_type: path
    query_params:
    - filter
    server_visible: true
    template: report
    data_entity: sales_metrics

- id: tableau
  vendor: Tableau Server
  product: Tableau Server
  layout: layouts/default.html
  environments:
    cloud:
      host: server.tableau.local
      base_path: /
      scheme: http
    self-hosted:
      host: tableau.company.com
      base_path: /
      scheme: http
  nav:
  - label: Views
    route_id: view
    href: /views
  routes:
  - id: view
    path: /views/{workbook}/{view}
    pattern_type: path
    query_params:
    - :showVizHome
    server_visible: true
    note: Tableau colon-prefixed params are treated as regular query params; urlencode
      will percent-encode the colon
    template: view
    data_entity: sales_metrics

- id: power-apps
  vendor: Microsoft
  product: Power Apps
  layout: layouts/default.html
  environments:
    cloud:
      host: apps.powerapps.local
      base_path: /
      scheme: http
    self-hosted:
      host: apps.company.com
      base_path: /
      scheme: http
  nav:
  - label: Apps
    route_id: app
    href: /play
  routes:
  - id: app
    path: /play/e/{env_id}/a/{app_id}
    pattern_type: path
    query_params:
    - tenantId
    - screen
    server_visible: true
    template: app
    data_entity: sales_orders

data:
  set: default

prometheus:
  scrape_interval: 15s
