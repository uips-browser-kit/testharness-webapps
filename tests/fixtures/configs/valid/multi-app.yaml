apps:
- id: salesforce
  vendor: Salesforce
  product: Lightning
  environments:
    dev:
      host: sf-dev.local
      base_path: /
  routes:
  - id: account-detail
    path: /lightning/r/Account/{id}/view
    pattern_type: path
    query_params: []
    server_visible: true
- id: jira
  vendor: Atlassian
  product: Jira
  environments:
    cloud:
      host: jira.company.atlassian.net
      base_path: /
  routes:
  - id: issue
    path: /browse/{issue_key}
    pattern_type: path
    query_params: []
    server_visible: true
