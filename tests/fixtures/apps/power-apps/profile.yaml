app:
  id: power-apps
  vendor: Microsoft
  product: Power Apps
  environments:
    cloud:
      host: power-apps-cloud.local
      base_path: /
    self-hosted:
      host: power-apps-onprem.local
      base_path: /
  routes:
  - id: app
    path: /play/e/{env_id}/a/{app_id}
    pattern_type: path
    query_params:
    - tenantId
    - screen
    server_visible: true
