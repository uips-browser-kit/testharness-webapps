app:
  id: sharepoint
  vendor: Microsoft
  product: SharePoint
  environments:
    cloud:
      host: sharepoint-cloud.local
      base_path: /
    self-hosted:
      host: sharepoint-onprem.local
      base_path: /
  routes:
  - id: document-detail
    path: /sites/{site_name}/Shared%20Documents/Forms/DispForm.aspx
    pattern_type: path
    query_params:
    - doc_id
    server_visible: true
  - id: document-list
    path: /sites/{site_name}/Shared%20Documents/Forms/AllItems.aspx
    pattern_type: path
    query_params: []
    server_visible: true
    note: URL-encoded space is a static segment — preserved as-is
  - id: home
    path: /sites/{site_name}
    pattern_type: path
    query_params: []
    server_visible: true
