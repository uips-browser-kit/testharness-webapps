app:
  id: confluence
  vendor: Atlassian
  product: Confluence
  environments:
    cloud:
      host: confluence.company.atlassian.local
      base_path: /wiki
    self-hosted:
      host: wiki.company.local
      base_path: /
  routes:
  - id: page
    path: /spaces/{space_key}/pages/{page_id}
    pattern_type: path
    query_params: []
    server_visible: true
