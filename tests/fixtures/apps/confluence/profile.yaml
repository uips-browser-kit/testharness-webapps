app:
  id: confluence
  vendor: Atlassian
  product: Confluence
  environments:
    cloud:
      host: confluence-cloud.local
      base_path: /wiki
    self-hosted:
      host: confluence-onprem.local
      base_path: /
  routes:
  - id: page
    path: /spaces/{space_key}/pages/{page_id}
    pattern_type: path
    query_params: []
    server_visible: true
  - id: space
    path: /spaces/{space_key}
    pattern_type: path
    query_params: []
    server_visible: true
  - id: home
    path: /
    pattern_type: path
    query_params: []
    server_visible: true
