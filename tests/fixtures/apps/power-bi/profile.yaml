app:
  id: power-bi
  vendor: Microsoft
  product: Power BI
  environments:
    cloud:
      host: power-bi-cloud.local
      base_path: /
    self-hosted:
      host: power-bi-onprem.local
      base_path: /
  routes:
  - id: report
    path: /groups/{workspace}/reports/{report_id}
    pattern_type: path
    query_params:
    - filter
    server_visible: true
