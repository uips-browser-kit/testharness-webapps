app:
  id: salesforce
  vendor: Salesforce
  product: Lightning
  environments:
    dev:
      host: sf-dev.local
      base_path: /
    prod:
      host: salesforce.company.com
      base_path: /
  routes:
  - id: account-list
    path: /lightning/r/Account/list/view
    pattern_type: path
    query_params: []
    server_visible: true
  - id: account-detail
    path: /lightning/r/Account/{id}/view
    pattern_type: path
    query_params: []
    server_visible: true
  - id: dashboard
    path: /lightning/page/home
    pattern_type: path
    query_params: []
    server_visible: true
