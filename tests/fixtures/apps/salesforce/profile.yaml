app:
  id: salesforce
  vendor: Salesforce
  product: Lightning
  environments:
    dev:
      host: salesforce-dev.local
      base_path: /
    prod:
      host: salesforce-prod.local
      base_path: /
  routes:
  - id: account-list
    path: /lightning/r/Account/list/view
    pattern_type: path
    query_params: []
    server_visible: true
  - id: account-detail
    path: /lightning/r/Account/{id}/view
    pattern_type: path
    query_params: []
    server_visible: true
  - id: contact-list
    path: /lightning/r/Contact/list/view
    pattern_type: path
    query_params: []
    server_visible: true
  - id: contact-detail
    path: /lightning/r/Contact/{id}/view
    pattern_type: path
    query_params: []
    server_visible: true
  - id: opportunity-list
    path: /lightning/r/Opportunity/list/view
    pattern_type: path
    query_params: []
    server_visible: true
  - id: opportunity-detail
    path: /lightning/r/Opportunity/{id}/view
    pattern_type: path
    query_params: []
    server_visible: true
  - id: dashboard
    path: /lightning/page/home
    pattern_type: path
    query_params: []
    server_visible: true
