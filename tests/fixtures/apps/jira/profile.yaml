app:
  id: jira
  vendor: Atlassian
  product: Jira
  environments:
    cloud:
      host: jira-cloud.local
      base_path: /
    self-hosted:
      host: jira-onprem.local
      base_path: /
  routes:
  - id: issue
    path: /browse/{issue_key}
    pattern_type: path
    query_params: []
    server_visible: true
  - id: issue-list
    path: /issues
    pattern_type: path
    query_params: []
    server_visible: true
  - id: home
    path: /jira
    pattern_type: path
    query_params: []
    server_visible: true
