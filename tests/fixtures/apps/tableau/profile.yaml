app:
  id: tableau
  vendor: Tableau Server
  product: Tableau Server
  environments:
    cloud:
      host: tableau-cloud.local
      base_path: /
    self-hosted:
      host: tableau-onprem.local
      base_path: /
  routes:
  - id: view
    path: /views/{workbook}/{view}
    pattern_type: path
    query_params:
    - :showVizHome
    server_visible: true
    note: Tableau colon-prefixed params are treated as regular query params; urlencode
      will percent-encode the colon
  - id: workbook
    path: /views/{workbook}
    pattern_type: path
    query_params: []
    server_visible: true
  - id: home
    path: /views
    pattern_type: path
    query_params: []
    server_visible: true
