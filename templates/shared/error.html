{% extends layout %}
{% block title %}{{ status_code }} {{ title }}{% endblock %}
{% block content %}
<div style="padding: 2rem;">
  <div style="font-size: 3rem; font-weight: 700; color: var(--sol-red, #dc322f); line-height: 1;">{{ status_code }}</div>
  <h1 style="font-size: 1.5rem; font-weight: 600; margin: 0.75rem 0 0.5rem;">{{ title }}</h1>
  <p style="color: var(--app-content-text, #839496); margin: 0 0 1rem;">{{ message }}</p>
  {% if retriable %}
  <p style="color: var(--sol-cyan, #2aa198); font-size: 0.875rem;">This error is temporary — you can retry the request.</p>
  {% endif %}
  <p style="font-size: 11px; color: var(--sol-base01, #586e75); margin-top: 2rem;">Request ID: {{ request_id }}</p>
</div>
{% endblock %}
