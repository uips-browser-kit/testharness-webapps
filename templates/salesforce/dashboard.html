{% extends layout %}

{% block title %}Home — {{ app_name }}{% endblock %}

{% block content %}
<h1 style="font-size:18px; font-weight:700; color:var(--app-primary); margin-bottom:1.5rem;">
  Home
</h1>

<div style="display:grid; grid-template-columns:repeat(3,1fr); gap:1rem; max-width:720px;">
  <div style="background:var(--sol-base02); border-radius:4px; padding:1rem;">
    <div style="font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--sol-base1); margin-bottom:.5rem;">Accounts</div>
    <div style="font-size:16px; font-weight:600;">
      <a href="/lightning/r/Account/list/view" style="color:var(--app-primary);">View All</a>
    </div>
  </div>
  <div style="background:var(--sol-base02); border-radius:4px; padding:1rem;">
    <div style="font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--sol-base1); margin-bottom:.5rem;">Contacts</div>
    <div style="font-size:16px; font-weight:600;">
      <a href="/lightning/r/Contact/list/view" style="color:var(--app-primary);">View All</a>
    </div>
  </div>
  <div style="background:var(--sol-base02); border-radius:4px; padding:1rem;">
    <div style="font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--sol-base1); margin-bottom:.5rem;">Opportunities</div>
    <div style="font-size:16px; font-weight:600;">
      <a href="/lightning/r/Opportunity/list/view" style="color:var(--app-primary);">View All</a>
    </div>
  </div>
</div>
{% endblock %}
